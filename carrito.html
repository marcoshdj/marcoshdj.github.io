<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Carrito | Marcos Herradón DJ</title>
  <link rel="preconnect" href="https://app.snipcart.com" />
  <link rel="preconnect" href="https://cdn.snipcart.com" />
  <link rel="stylesheet" href="https://cdn.snipcart.com/themes/v3.4.3/default/snipcart.css" />
  <style>
    body { background-color: #070707; color: #f5f3ef; font-family: 'Inter', sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; margin: 0; padding: 20px; }
    .brand-logo { width: 80px; margin-bottom: 20px; }
    h1 { font-family: 'Syne', sans-serif; font-size: 2rem; margin-bottom: 10px; text-transform: uppercase; }
    #cart-summary { width: 100%; max-width: 400px; margin-bottom: 30px; background: rgba(255,255,255,0.03); border: 1px solid rgba(200,169,110,0.3); border-radius: 10px; padding: 20px; text-align: left; }
    .cart-item { display: flex; justify-content: space-between; padding: 10px 0; border-bottom: 1px solid rgba(255,255,255,0.05); }
    .btn-solid { background: #c8a96e; color: #000; padding: 15px 50px; border-radius: 6px; font-weight: bold; text-transform: uppercase; cursor: pointer; border: none; font-size: 1.1rem; }
    .back-link { color: rgba(245,243,239,0.5); margin-top: 20px; text-decoration: none; }
  </style>
</head>
<body>
  <img src="https://raw.githubusercontent.com/marcoshdj/marcoshdj.github.io/main/fondoweb.png" alt="Logo" class="brand-logo">
  <h1>Tu Carrito</h1>
  <div id="cart-summary"><p>Cargando productos...</p></div>
  
<!-- Botón directo de Snipcart nativo -->
<button class="snipcart-checkout btn-solid" style="cursor: pointer;">
  PAGAR AHORA
</button>
  
  <a href="index.html" class="back-link">← Volver</a>

  <script>
    document.addEventListener('snipcart.ready', () => {
      const render = () => {
        const items = Snipcart.store.getState().cart.items.items;
        document.getElementById('cart-summary').innerHTML = items.length ? 
          items.map(i => `<div class="cart-item"><span>${i.quantity}x ${i.name}</span><span>${i.totalPrice.toFixed(2)}€</span></div>`).join('')

      render();
      Snipcart.store.subscribe(render);
