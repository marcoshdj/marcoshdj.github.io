<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tu Carrito | Marcos Herradón DJ</title>
  
  <!-- Tipografía -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet" />
  
  <!-- Snipcart CSS -->
  <link rel="preconnect" href="https://app.snipcart.com" />
  <link rel="preconnect" href="https://cdn.snipcart.com" />
  <link rel="stylesheet" href="https://cdn.snipcart.com/themes/v3.4.3/default/snipcart.css" />

  <style>
    body { 
      background-color: #070707; 
      color: #f5f3ef; 
      font-family: 'Inter', sans-serif; 
      display: flex; 
      flex-direction: column; 
      align-items: center; 
      justify-content: center; 
      min-height: 100vh; 
      margin: 0; 
      text-align: center;
      padding: 20px;
    }
    .brand-logo { width: 80px; margin-bottom: 20px; }
    h1 { font-size: 2rem; margin-bottom: 10px; }
    p { color: #c8a96e; margin-bottom: 30px; font-size: 1.1rem; }
    
    .btn-solid { 
      background: #c8a96e; 
      color: #000; 
      padding: 15px 50px; 
      border-radius: 6px; 
      font-weight: bold; 
      text-transform: uppercase; 
      cursor: pointer; 
      border: none; 
      font-size: 1.1rem;
      transition: 0.3s;
      letter-spacing: 1px;
    }
    .btn-solid:hover { background: #d9bc88; transform: translateY(-2px); }
    
    .back-link { 
      color: rgba(245,243,239,0.5); 
      margin-top: 30px; 
      text-decoration: none; 
      font-size: 0.9rem;
      transition: 0.3s;
    }
    .back-link:hover { color: #c8a96e; }

    /* Estilos para el ticket resumen del carrito */
    #cart-summary {
      width: 100%;
      max-width: 400px;
      margin-bottom: 30px;
      background: rgba(255,255,255,0.03);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 10px;
      padding: 20px;
      text-align: left;
    }
    .cart-item {
      display: flex;
      justify-content: space-between;
      border-bottom: 1px solid rgba(255,255,255,0.05);
      padding: 10px 0;
      font-size: 0.95rem;
    }
    .cart-item:last-child { border-bottom: none; }
    
    .cart-total {
      display: flex;
      justify-content: space-between;
      padding-top: 15px;
      margin-top: 10px;
      border-top: 1px solid rgba(200,169,110,0.3);
      font-weight: bold;
      font-size: 1.2rem;
    }
    .gold-text { color: #c8a96e; }
  </style>
</head>
<body>

  <!-- Logo y Mensaje -->
  <img src="https://raw.githubusercontent.com/marcoshdj/marcoshdj.github.io/main/fondoweb.png" alt="Marcos Herradón" class="brand-logo">
  <h1>Tu Carrito de Compra</h1>
  <p>Revisa tu pedido antes de finalizar.</p>
  
  <!-- Contenedor donde aparecerán los productos automáticamente -->
  <div id="cart-summary">
    <p style="text-align: center; color: rgba(245,243,239,0.5); font-size: 0.9rem;">Cargando productos...</p>
  </div>
  
  <!-- Botón de Pago directo -->
  <button class="snipcart-checkout btn-solid">PAGAR</button>

  <!-- Volver a la web -->
  <a href="index.html" class="back-link">← Volver a la web principal</a>

  <!-- SNIPCART ENGINE -->
  <script>
      window.SnipcartSettings = {
          publicApiKey: 'YTA5MTA5NDMtNDhlYi00ODFiLTg1MDktODEzYjNmYjcwZGRiNjM5MTkyMDg0OTcyMjc3NzAw',

  <!-- Script para leer los productos de la memoria de Snipcart y pintarlos en pantalla -->
  <script>
    function actualizarResumenCarrito() {
      const state = Snipcart.store.getState();
      const items = state.cart.items.items;
      const summaryContainer = document.getElementById('cart-summary');

      // Si no hay nada en el carrito
      if (items.length === 0) {
        summaryContainer.innerHTML = '<p style="text-align: center; color: rgba(245,243,239,0.5); font-size: 0.9rem; margin: 0;">Tu carrito está vacío.</p>';
        return;
      }

      // Si hay productos, construimos el HTML
      let html = '';
      items.forEach(item => {
        html += `
          <div class="cart-item">
            <span>${item.quantity}x ${item.name}</span>
            <span class="gold-text">${item.totalPrice.toFixed(2)} €</span>
          </div>
        `;
      });

      // Añadimos el Total general al final
      html += `
        <div class="cart-total">
          <span>Total:</span>
          <span class="gold-text">${state.cart.total.toFixed(2)} €</span>
        </div>
      `;

      summaryContainer.innerHTML = html;
    }

    // Ejecutamos la función en cuanto Snipcart esté listo en la web
    document.addEventListener('snipcart.ready', function() {
      actualizarResumenCarrito();
      
      // Si el usuario cambia la cantidad o borra algo, la lista se actualiza sola
      Snipcart.store.subscribe(actualizarResumenCarrito);
    });
  </script>
</body>
</html>
